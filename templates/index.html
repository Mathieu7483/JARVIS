<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JARVIS — Système v3.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#04080f;--c-panel:#070d18;--c-border:#0d2035;
  --c-cyan:#00d4ff;--c-cyan2:#00ffcc;--c-blue:#0066aa;
  --c-dim:#0a3050;--c-text:#7ac8e0;--c-text2:#2a6a8a;
  --font-main:'Share Tech Mono',monospace;--font-title:'Orbitron',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--c-bg);color:var(--c-text);font-family:var(--font-main)}
.layout{display:grid;grid-template-rows:44px 1fr 80px;grid-template-columns:1fr 360px;height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--c-panel);border-bottom:1px solid var(--c-border)}
.topbar-title{font-family:var(--font-title);font-size:13px;letter-spacing:4px;color:var(--c-cyan)}
.topbar-info{display:flex;gap:24px;font-size:10px;color:var(--c-text2);letter-spacing:1px}
.topbar-info span{display:flex;align-items:center;gap:6px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--c-cyan);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;position:relative;overflow:hidden}
.center::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--c-border) 1px,transparent 1px),linear-gradient(90deg,var(--c-border) 1px,transparent 1px);background-size:40px 40px;opacity:0.25}
#brainContainer{position:relative;z-index:1}
.status-ring{position:relative;z-index:1;display:flex;align-items:center;gap:10px;padding:6px 18px;border:1px solid var(--c-dim);border-radius:20px;font-size:10px;letter-spacing:3px;color:var(--c-cyan);background:rgba(0,20,40,0.8);transition:all 0.4s}
.status-ring.thinking{border-color:#ff8800;color:#ff8800}
.status-ring.speaking{border-color:var(--c-cyan2);color:var(--c-cyan2)}
.status-indicator{width:7px;height:7px;border-radius:50%;background:var(--c-cyan);animation:blink 1.4s infinite;transition:background 0.4s}
.status-ring.thinking .status-indicator{background:#ff8800;animation-duration:0.5s}
.status-ring.speaking .status-indicator{background:var(--c-cyan2);animation-duration:0.3s}
.visualizer{position:relative;z-index:1;display:flex;align-items:flex-end;gap:3px;height:40px;width:180px}
.vbar{flex:1;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--c-blue),var(--c-cyan));animation:vwave ease-in-out infinite alternate;opacity:0.7}
.vbar:nth-child(1){animation-duration:.5s}.vbar:nth-child(2){animation-duration:.7s}.vbar:nth-child(3){animation-duration:.4s}
.vbar:nth-child(4){animation-duration:.9s}.vbar:nth-child(5){animation-duration:.6s}.vbar:nth-child(6){animation-duration:.8s}
.vbar:nth-child(7){animation-duration:.5s}.vbar:nth-child(8){animation-duration:.7s}.vbar:nth-child(9){animation-duration:.4s}
.vbar:nth-child(10){animation-duration:.6s}.vbar:nth-child(11){animation-duration:.9s}.vbar:nth-child(12){animation-duration:.5s}
@keyframes vwave{from{height:8%}to{height:95%}}
.tbox{position:relative;z-index:1;width:100%;max-width:420px;border:1px solid var(--c-dim);border-radius:4px;padding:8px 14px;background:rgba(4,12,24,0.9);transition:border-color 0.4s}
.tbox.active{border-color:var(--c-cyan)}
.tbox-label{font-size:8px;letter-spacing:3px;color:var(--c-text2);margin-bottom:4px}
.tbox-text{font-size:13px;color:var(--c-cyan);line-height:1.5;min-height:18px}
.tbox-text.response{color:var(--c-cyan2)}
.cursor{display:inline-block;width:8px;height:13px;background:var(--c-cyan);animation:blink .8s infinite;vertical-align:middle;margin-left:2px}
.right-panel{display:flex;flex-direction:column;border-left:1px solid var(--c-border);overflow:hidden}
.panel-header{padding:12px 16px;font-size:8px;letter-spacing:3px;color:var(--c-text2);border-bottom:1px solid var(--c-border);background:var(--c-panel)}
.history{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.history::-webkit-scrollbar{width:3px}
.history::-webkit-scrollbar-thumb{background:var(--c-dim);border-radius:2px}
.msg{display:flex;flex-direction:column;gap:4px;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-who{font-size:8px;letter-spacing:2px}
.msg-who.user{color:var(--c-blue)}.msg-who.jarvis{color:#00aa66}
.msg-bubble{font-size:11px;line-height:1.6;padding:8px 10px;border-radius:2px;border-left:2px solid}
.msg-bubble.user{border-color:var(--c-blue);background:rgba(0,60,100,0.15);color:var(--c-text)}
.msg-bubble.jarvis{border-color:#00aa66;background:rgba(0,100,60,0.1);color:#4ae0a0}
.bottombar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-top:1px solid var(--c-border);background:var(--c-panel)}
.btn-start{font-family:var(--font-title);font-size:10px;letter-spacing:3px;padding:8px 24px;border-radius:2px;border:1px solid var(--c-cyan);background:transparent;color:var(--c-cyan);cursor:pointer;transition:all 0.3s}
.btn-start:hover{background:var(--c-cyan);color:var(--c-bg)}
.btn-start.active{border-color:#ff4444;color:#ff4444}
.btn-start.active:hover{background:#ff4444;color:var(--c-bg)}
.sys-stats{display:flex;gap:20px;font-size:9px;color:var(--c-text2);letter-spacing:1px}
</style>
</head>
<body>
<div class="layout">
  <header class="topbar">
    <span class="topbar-title">J.A.R.V.I.S</span>
    <div class="topbar-info">
      <span><div class="live-dot"></div>llama3.1:8b</span>
      <span>RTX 3060 · 12 GB</span>
      <span>WHISPER small</span>
    </div>
  </header>
  <main class="center">
    <div id="brainContainer"></div>
    <div class="status-ring" id="statusBadge">
      <div class="status-indicator"></div>
      <span id="statusText">EN ÉCOUTE</span>
    </div>
    <div class="visualizer">
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
    </div>
    <div class="tbox" id="transBox">
      <div class="tbox-label">TRANSCRIPTION</div>
      <div class="tbox-text" id="transText"><span class="cursor"></span></div>
    </div>
    <div class="tbox" id="respBox">
      <div class="tbox-label">RÉPONSE JARVIS</div>
      <div class="tbox-text response" id="respText"><span class="cursor"></span></div>
    </div>
  </main>
  <aside class="right-panel">
    <div class="panel-header">HISTORIQUE DE CONVERSATION</div>
    <div class="history" id="history"></div>
  </aside>
  <footer class="bottombar">
    <div class="sys-stats">
      <span id="stat-time">--:--</span>
      <span>LOCAL INFERENCE</span>
      <span>ANTHROPIC</span>
    </div>
    <button class="btn-start" id="btnStart" onclick="toggleJarvis()">▶ ACTIVER JARVIS</button>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
const W = 800, H = 600;
const container = document.getElementById('brainContainer');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
camera.position.set(0, 0, 3.2);

const group = new THREE.Group();
scene.add(group);

let synapseNodes = [];
let synapsePulses = [];
let synapseLines = null;
let greenParticleSystem = null;
let currentState = 'idle';
let jarvisActive = false;

// Couleurs des pulses selon état
const PULSE_COLORS_IDLE     = [0x00d4ff, 0x0088cc, 0x00aaff, 0x0066bb];
const PULSE_COLORS_THINKING = [0xff8800, 0xffaa00, 0xff6600];
const PULSE_COLORS_SPEAKING = [0x00ffcc, 0x00ffaa, 0x22ffdd];

// ─── CHARGEMENT DES POINTS ───────────────────────────────────────
fetch('/static/brain_points.json')
  .then(r => r.json())
  .then(points => {
    console.log('[JARVIS] ' + points.length + ' points chargés');
    
    // CORRECTION DES AXES : 
    // On remplace Y par Z, et on inverse le Y d'origine pour le remettre à l'endroit
    synapseNodes = points.map(p => new THREE.Vector3(p[0], p[2], -p[1]));
    
    // Optionnel : Ajustement de la position globale si le cerveau est trop bas/haut
    group.position.y = 0.2; 
    
    buildSynapses(PULSE_COLORS_IDLE);
  })
  .catch(err => {
    console.error('[JARVIS] Erreur chargement points:', err);
    buildFallback();
  });

function buildSynapses(pulseColors) {
  // Nettoyer l'ancien réseau
  while(group.children.length > 0) group.remove(group.children[0]);
  synapsePulses = [];
  synapseLines = null;

  const connections = [];
  const lineVerts = [];

  // Distance adaptée à la densité des points
  const distMax = 0.28;

  for (let i = 0; i < synapseNodes.length; i++) {
    for (let j = i+1; j < synapseNodes.length; j++) {
      const d = synapseNodes[i].distanceTo(synapseNodes[j]);
      if (d < distMax && Math.random() < 0.4) {
        connections.push({a:i, b:j});
        lineVerts.push(
          synapseNodes[i].x, synapseNodes[i].y, synapseNodes[i].z,
          synapseNodes[j].x, synapseNodes[j].y, synapseNodes[j].z
        );
      }
    }
  }

  console.log('[JARVIS] ' + connections.length + ' connexions synaptiques');

  // Lignes statiques du réseau
  if (lineVerts.length > 0) {
    const lg = new THREE.BufferGeometry();
    lg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lineVerts), 3));
    synapseLines = new THREE.LineSegments(lg,
      new THREE.LineBasicMaterial({ color: 0x003a5a, transparent: true, opacity: 0.15 }));
    group.add(synapseLines);
  }

  // Neurones (petits points lumineux)
  const ng = new THREE.BufferGeometry();
  const np = new Float32Array(synapseNodes.length * 3);
  synapseNodes.forEach((n,i) => { np[i*3]=n.x; np[i*3+1]=n.y; np[i*3+2]=n.z; });
  ng.setAttribute('position', new THREE.BufferAttribute(np, 3));
  group.add(new THREE.Points(ng,
    new THREE.PointsMaterial({ color: 0x0088bb, size: 0.008, transparent: true, opacity: 0.5 })));
  // Couche de points verts plus brillants pour les synapses actives
  const greenMat = new THREE.PointsMaterial({
    color: 0x00ffcc,       // Vert/Cyan technologique brillant
    size: 0.015,           // Plus grosses que les bleues pour être visibles
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending
  });
  greenParticleSystem = new THREE.Points(ng.clone(), greenMat);
  group.add(greenParticleSystem);

  // Pulses lumineux avec traînées
  const pGeo = new THREE.SphereGeometry(0.012, 5, 5);
  const pulseCount = Math.min(50, connections.length);

  for (let k = 0; k < pulseCount; k++) {
    const col = pulseColors[k % pulseColors.length];

    // Sphère pulse
    const mesh = new THREE.Mesh(pGeo,
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.95 }));
    group.add(mesh);

    // Traînée lumineuse
    const tGeo = new THREE.BufferGeometry();
    tGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
    const trail = new THREE.Line(tGeo,
      new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.6, linewidth: 2 }));
    group.add(trail);

    synapsePulses.push({
      mesh, trail, tGeo, connections,
      ci: Math.floor(Math.random() * connections.length),
      t: Math.random(),
      speed: 0.006 + Math.random() * 0.01,
      dir: Math.random() > 0.5 ? 1 : -1
    });
  }
}

function buildFallback() {
  // Cerveau procédural si JSON manquant
  const pts = [];
  for (let i = 0; i < 300; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const side = Math.random() > 0.5 ? 0.25 : -0.25;
    const r = 0.55 + Math.random() * 0.3;
    const nx = 0.08 * Math.sin(theta * 5) * Math.cos(phi * 4);
    pts.push(new THREE.Vector3(
      r * Math.sin(phi) * Math.cos(theta) * 1.15 + side + nx,
      r * Math.sin(phi) * Math.sin(theta) * 0.82 + nx * 0.5,
      r * Math.cos(phi) * 0.88
    ));
  }
  synapseNodes = pts;
  buildSynapses(PULSE_COLORS_IDLE);
}

// ─── ANIMATION ───────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.007;

  // Rotation lente et naturelle
  group.rotation.y = t * 0.12;
  group.rotation.x = Math.sin(t * 0.07) * 0.05;

  // Pulsation réseau selon état
  if (synapseLines) {
    const baseOpacity = currentState === 'thinking' ? 0.25 : currentState === 'speaking' ? 0.3 : 0.12;
    const pulseSpeed  = currentState === 'thinking' ? 4 : currentState === 'speaking' ? 6 : 1;
    synapseLines.material.opacity = baseOpacity + 0.08 * Math.sin(t * pulseSpeed);
  }

    // ─── ANIMATION DES PARTICULES VERTES SELON L'ÉTAT D'OLLAMA ───
if (greenParticleSystem) {
  if (currentState === 'thinking') {
    // Mode Réflexion : Pulsation rapide de la taille et de l'intensité
    const pulseThinking = Math.sin(t * 15); // Fréquence rapide
    greenParticleSystem.material.size = 0.015 + 0.010 * pulseThinking;
    greenParticleSystem.material.opacity = 0.5 + 0.5 * Math.sin(t * 20);
    
    // Légère distorsion rotationnelle chaotique pendant la réflexion
    greenParticleSystem.rotation.z = Math.sin(t * 5) * 0.05;
  } else if (currentState === 'speaking') {
    // Mode Parole : Intensité stable, taille moyenne
    greenParticleSystem.material.size = 0.012;
    greenParticleSystem.material.opacity = 0.4 + 0.2 * Math.sin(t * 5);
    greenParticleSystem.rotation.z = 0;
  } else {
    // Mode Veille / Écoute : Très discret, presque invisible
    greenParticleSystem.material.size = 0.006;
    greenParticleSystem.material.opacity = 0.15 + 0.05 * Math.sin(t * 2);
    greenParticleSystem.rotation.z = 0;
  }
}
  // Mise à jour pulses
  synapsePulses.forEach((p, k) => {
    p.t += p.speed * p.dir;
    if (p.t > 1 || p.t < 0) {
      p.dir *= -1;
      p.ci = Math.floor(Math.random() * p.connections.length);
      // Petite pause aléatoire
      if (Math.random() < 0.15) p.speed = 0.003 + Math.random() * 0.008;
    }
    p.t = Math.max(0, Math.min(1, p.t));

    const c = p.connections[p.ci];
    if (!c) return;
    const na = synapseNodes[c.a], nb = synapseNodes[c.b];
    if (!na || !nb) return;

    // Position du pulse
    const px = na.x + (nb.x-na.x)*p.t;
    const py = na.y + (nb.y-na.y)*p.t;
    const pz = na.z + (nb.z-na.z)*p.t;
    p.mesh.position.set(px, py, pz);

    // Pulsation taille
    const sc = 0.7 + 0.5 * Math.sin(t * 5 + k * 0.7);
    p.mesh.scale.setScalar(sc);
    p.mesh.material.opacity = 0.75 + 0.25 * Math.sin(t * 6 + k);

    // Traînée
    const trailLen = 0.18;
    const trailT = Math.max(0, Math.min(1, p.t - trailLen * p.dir));
    const tx = na.x + (nb.x-na.x)*trailT;
    const ty = na.y + (nb.y-na.y)*trailT;
    const tz = na.z + (nb.z-na.z)*trailT;
    const arr = p.tGeo.attributes.position.array;
    arr[0]=tx; arr[1]=ty; arr[2]=tz;
    arr[3]=px; arr[4]=py; arr[5]=pz;
    p.tGeo.attributes.position.needsUpdate = true;
    p.trail.material.opacity = 0.4 + 0.3 * Math.sin(t * 6 + k);
  });

  renderer.render(scene, camera);
}
animate();

// ─── HORLOGE ─────────────────────────────────────────────────────
setInterval(() => {
  const n = new Date();
  document.getElementById('stat-time').textContent =
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}, 1000);

// ─── SOCKET.IO ───────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => console.log('[JARVIS] Socket connecté'));

socket.on('status', (data) => {
  currentState = data.state;
  const badge = document.getElementById('statusBadge');
  const text  = document.getElementById('statusText');
  badge.className = 'status-ring ' + data.state;
  const labels = { listening:'EN ÉCOUTE', thinking:'RÉFLEXION...', speaking:'EN COURS...', idle:'EN VEILLE' };
  text.textContent = labels[data.state] || data.state.toUpperCase();

  // Changer couleur des pulses selon l'état
  const cols = data.state === 'thinking' ? PULSE_COLORS_THINKING
             : data.state === 'speaking' ? PULSE_COLORS_SPEAKING
             : PULSE_COLORS_IDLE;
  synapsePulses.forEach((p, k) => {
    p.mesh.material.color.setHex(cols[k % cols.length]);
    p.trail.material.color.setHex(cols[k % cols.length]);
  });
});

socket.on('transcription', (data) => {
  document.getElementById('transText').textContent = data.text;
  document.getElementById('transBox').classList.add('active');
  setTimeout(() => document.getElementById('transBox').classList.remove('active'), 2000);
  addMessage('user', data.text);
});

socket.on('response', (data) => {
  document.getElementById('respText').textContent = data.text;
  document.getElementById('respBox').classList.add('active');
  setTimeout(() => document.getElementById('respBox').classList.remove('active'), 3000);
  addMessage('jarvis', data.text);
});

function addMessage(role, text) {
  const h = document.getElementById('history');
  const m = document.createElement('div');
  m.className = 'msg';
  m.innerHTML = '<span class="msg-who '+role+'">'+(role==='user'?'— MONSIEUR':'— JARVIS')+'</span><div class="msg-bubble '+role+'">'+text+'</div>';
  h.appendChild(m);
  h.scrollTop = h.scrollHeight;
}

// ─── BOUTON ──────────────────────────────────────────────────────
function toggleJarvis() {
  const btn = document.getElementById('btnStart');
  jarvisActive = !jarvisActive;
  if (jarvisActive) {
    socket.emit('start');
    btn.textContent = '■ DÉSACTIVER';
    btn.classList.add('active');
  } else {
    socket.emit('stop');
    btn.textContent = '▶ ACTIVER JARVIS';
    btn.classList.remove('active');
  }
}
</script>
</body>
</html>
